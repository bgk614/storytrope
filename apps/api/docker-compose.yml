# netcup VPS용 배포 구성: postgres + 마이그레이션 + api
# 서버에서 .env.docker.example을 .env로 복사해 값을 채운 뒤:
#   docker compose up -d --build
services:
  db:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-storytrope}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-storytrope}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-storytrope} -d ${POSTGRES_DB:-storytrope}']
      interval: 5s
      timeout: 3s
      retries: 10

  # prisma CLI가 devDependency라 build 스테이지 이미지로 마이그레이션을 실행한다
  migrate:
    build:
      context: .
      target: build
    command: pnpm exec prisma migrate deploy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-storytrope}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-storytrope}
    depends_on:
      db:
        condition: service_healthy
    restart: 'no'

  api:
    build:
      context: .
      target: runner
    restart: unless-stopped
    # 호스트의 리버스 프록시(nginx 등)만 접근하도록 루프백에 바인딩
    ports:
      - '127.0.0.1:${PORT:-4000}:${PORT:-4000}'
    environment:
      PORT: ${PORT:-4000}
      BACK_URL: ${BACK_URL:?BACK_URL is required}
      FRONT_URL: ${FRONT_URL:?FRONT_URL is required}
      DATABASE_URL: postgresql://${POSTGRES_USER:-storytrope}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-storytrope}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      SESSION_DAYS: ${SESSION_DAYS:-7}
      TRUST_PROXY_HOPS: ${TRUST_PROXY_HOPS:-1}
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  db-data:
